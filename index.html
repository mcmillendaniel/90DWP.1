<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>90DWP</title>
  <meta name="theme-color" content="#d9e7dc" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <div class="ticker" id="ticker">
      <div class="ticker-indicator" id="tickerIndicator" aria-label="outcome status"></div>
      <div class="ticker-text" id="tickerText">Set your 3 Outcomes in Checkoffs.</div>
    </div>
  </header>

  <main class="main" id="main"></main>

  <nav class="tabbar" role="navigation" aria-label="Tabs">
    <button class="tab" data-tab="home" aria-label="Home">🏠</button>
    <button class="tab" data-tab="checkoffs" aria-label="Checkoffs">✅</button>
    <button class="tab" data-tab="morning" aria-label="Morning Stack">☀️</button>
    <button class="tab" data-tab="history" aria-label="History">📖</button>
    <button class="tab" data-tab="settings" aria-label="Settings">⚙️</button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ── Time Edit Modals ─────────────────────────────────────── -->
  <div id="editConfirmModal" class="te-overlay" aria-hidden="true">
    <div class="te-sheet">
      <div class="te-title">Edit logged time?</div>
      <div class="te-sub" id="editConfirmSub">Currently: —</div>
      <div class="te-actions">
        <button class="te-btn te-btn--ghost" id="editConfirmCancel">Cancel</button>
        <button class="te-btn te-btn--primary" id="editConfirmYes">Yes, edit</button>
      </div>
    </div>
  </div>

  <div id="editPickerModal" class="te-overlay" aria-hidden="true">
    <div class="te-sheet">
      <div class="te-title">Set time</div>
      <div class="te-picker-wrap">
        <div class="te-drum-col">
          <div class="te-drum" id="drumHour"></div>
        </div>
        <div class="te-drum-sep">:</div>
        <div class="te-drum-col">
          <div class="te-drum" id="drumMin"></div>
        </div>
        <div class="te-drum-col te-drum-col--ampm">
          <div class="te-drum" id="drumAmPm"></div>
        </div>
        <div class="te-drum-highlight"></div>
      </div>
      <div class="te-actions">
        <button class="te-btn te-btn--ghost" id="editPickerCancel">Cancel</button>
        <button class="te-btn te-btn--primary" id="editPickerConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
